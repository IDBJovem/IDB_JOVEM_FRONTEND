server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: qualquer rota desconhecida (ex.: /admin/produtos) cai no index.html
    # e o React Router resolve no client. Sem isso, o nginx devolve 404 ao
    # acessar/recarregar direto numa rota interna.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets com hash no nome são imutáveis → cache longo.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
